<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      padding: 3rem 2rem 2rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #c8a2f8, #7eb8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 0.5rem;
      color: #666;
      font-size: 1rem;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .game-card {
      background: #141420;
      border: 1px solid #1e1e30;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }

    .game-card:hover {
      transform: translateY(-4px);
      border-color: #3a3a5c;
    }

    .game-card .thumbnail {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      user-select: none;
    }

    .game-card .info {
      padding: 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .game-card .info h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .game-card .info p {
      font-size: 0.875rem;
      color: #888;
      line-height: 1.5;
      flex: 1;
    }

    .game-card .tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      background: #1e1e30;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #444;
    }

    footer {
      text-align: center;
      padding: 3rem 2rem;
      color: #333;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Games</h1>
    <p>A collection of games I've built</p>
  </header>

  <main class="games-grid" id="games-grid"></main>

  <footer>
    <span id="game-count"></span>
  </footer>

  <script>
    const games = [
      {
        title: "Mancala",
        description: "A classic board game brought online. Play against friends in real-time multiplayer matches.",
        emoji: "\u{1F3B2}",
        color: "#2a1a0a",
        url: null,
        tags: ["multiplayer", "strategy", "board game"],
      },
    ];

    const grid = document.getElementById("games-grid");
    const count = document.getElementById("game-count");

    count.textContent = `${games.length} game${games.length !== 1 ? "s" : ""}`;

    games.forEach((game) => {
      const card = document.createElement(game.url ? "a" : "div");
      if (game.url) card.href = game.url;
      card.className = "game-card";
      card.innerHTML = `
        <div class="thumbnail" style="background: ${game.color}">
          ${game.emoji}
        </div>
        <div class="info">
          <h2>${game.title}</h2>
          <p>${game.description}</p>
          <div class="tags">
            ${game.tags.map((t) => `<span class="tag">${t}</span>`).join("")}
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
